name: Appium Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        api-level: [29]
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up Appium
      run: |
        npm install -g appium@next
        appium driver install uiautomator2
        appium &

    - name: Run Appium Tests with Emulator
      uses: reactivecircus/android-emulator-runner@v3
      with:
        api-level: ${{ matrix.api-level }}
        target: default
        arch: x86_64
        profile: Nexus 6
        script: mvn test
