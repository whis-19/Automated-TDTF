version: "3.8"

services:
  appium-server:
    build: .
    container_name: appium-server
    ports:
      - "4723:4723"
    environment:
      - ANDROID_HOME=/opt/android
    privileged: true
    volumes:
      - /dev/kvm:/dev/kvm
      - ./to_do.apk:/app/to_do.apk

  test-runner:
    image: maven:3.9-eclipse-temurin-17
    container_name: test-runner
    depends_on:
      - appium-server
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - APPIUM_HOST=appium-server
      - APPIUM_PORT=4723
    command: >
      sh -c "sleep 30 && mvn test -Dappium.host=appium-server -Dappium.port=4723"
